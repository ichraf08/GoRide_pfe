spring.application.name=GoRide

# =============================================
# Configuration MySQL
# =============================================
spring.datasource.url=jdbc:mysql://127.0.0.1:3300/goride_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# =============================================
# Configuration JPA / Hibernate
# =============================================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# Serveur
# =============================================
server.port=8081

# =============================================
# JWT (JSON Web Token)
# =============================================
# Clé secrète encodée en Base64 (256 bits minimum pour HS256)
app.jwt.secret=R29SaWRlU2VjcmV0S2V5UEZFMjAyNlZlcnlMb25nQW5kU2VjdXJlMjU2Qml0c01pbmltdW0h
# Durée de validité du token : 24 heures (en millisecondes)
app.jwt.expiration=86400000

# =============================================
# Logging
# =============================================
logging.level.com.pfeproject.GoRide=DEBUG
logging.level.org.springframework.security=DEBUG
