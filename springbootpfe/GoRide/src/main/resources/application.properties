spring.application.name=GoRide

# =============================================
# Configuration MySQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/goride_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# =============================================
# Configuration JPA / Hibernate
# =============================================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# Serveur
# =============================================
server.port=8081

# =============================================
# JWT (JSON Web Token)
# =============================================
# Clé secrète encodée en Base64 (256 bits minimum pour HS256)
app.jwt.secret=R29SaWRlU2VjcmV0S2V5UEZFMjAyNlZlcnlMb25nQW5kU2VjdXJlMjU2Qml0c01pbmltdW0h
# Durée de validité du token : 24 heures (en millisecondes)
app.jwt.expiration=86400000

# =============================================
# URL de base de l'application (utilisée dans les emails)
# =============================================
app.base-url=http://localhost:4200

# =============================================
# Logging
# =============================================
logging.level.com.pfeproject.GoRide=DEBUG
logging.level.org.springframework.security=DEBUG
# =============================================
# Configuration Email (Gmail SMTP - Final)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=achref6258@gmail.com
spring.mail.password=apepasdwavmagzah

# Propriétés techniques SMTP
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=true
spring.mail.properties.mail.debug=false

# Timeouts pour éviter de bloquer l'application
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Activer le debug pour voir les échanges dans la console (optionnel)
