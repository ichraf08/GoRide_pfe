<section class="ftco-section contact-section">
  <div class="container">
    <div class="row justify-content-center mb-5">
      <div class="col-md-7 text-center heading-section">
        <span class="subheading">{{ 'FOOTER.CONTACT' | translate }}</span>
        <h2 class="mb-3">{{ 'FOOTER.QUESTIONS' | translate }}</h2>
      </div>
    </div>
    
    <div class="row d-flex mb-5 contact-info">
      <div class="col-md-4">
        <div class="contact-box p-4 text-center">
          <div class="icon d-flex align-items-center justify-content-center mb-3">
            <span class="ion-ios-pin"></span>
          </div>
          <p><span>Adresse:</span> 123 Rue de la Liberté, Tunis, Tunisie</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="contact-box p-4 text-center">
          <div class="icon d-flex align-items-center justify-content-center mb-3">
            <span class="ion-ios-call"></span>
          </div>
          <p><span>Téléphone:</span> <a href="tel://1234567920">+216 71 000 000</a></p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="contact-box p-4 text-center">
          <div class="icon d-flex align-items-center justify-content-center mb-3">
            <span class="ion-ios-mail"></span>
          </div>
          <p><span>Email:</span> <a href="mailto:info@goride.tn">contact@goride.tn</a></p>
        </div>
      </div>
    </div>

    <div class="row block-9 justify-content-center">
      <div class="col-md-8 mb-md-5">
        <form action="#" class="bg-light p-5 contact-form">
          <div class="row">
            <div class="col-md-6">
              <div class="form-group mb-3">
                <input type="text" class="form-control" placeholder="Votre Nom">
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group mb-3">
                <input type="email" class="form-control" placeholder="Votre Email">
              </div>
            </div>
          </div>
          <div class="form-group mb-3">
            <input type="text" class="form-control" placeholder="Sujet">
          </div>
          <div class="form-group mb-4">
            <textarea name="" id="" cols="30" rows="7" class="form-control" placeholder="Message"></textarea>
          </div>
          <div class="form-group text-center">
            <input type="submit" value="Envoyer le message" class="btn btn-primary py-3 px-5">
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
