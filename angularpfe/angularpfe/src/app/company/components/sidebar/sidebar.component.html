<aside class="sidebar shadow-sm">
  <div class="sidebar-brand">
    <div class="logo-wrapper">
      <svg viewBox="0 0 100 100" width="32" height="32">
        <rect x="20" y="20" width="60" height="60" rx="10" fill="#4f46e5"/>
        <path d="M 40 40 L 60 40 M 40 50 L 60 50 M 40 60 L 50 60" stroke="white" stroke-width="6" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">GO<span class="text-indigo">CORP</span></span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <p class="section-title">Entreprise</p>
      <a routerLink="/company/home" routerLinkActive="active" class="nav-item">
        <span class="ion-ios-apps icon"></span>
        <span>Dashboard</span>
      </a>
      <a routerLink="/company/employees" routerLinkActive="active" class="nav-item">
        <span class="ion-ios-people icon"></span>
        <span>Collaborateurs</span>
      </a>
    </div>

    <div class="nav-section">
      <p class="section-title">Finance</p>
      <a routerLink="/company/billing" routerLinkActive="active" class="nav-item">
        <span class="ion-ios-paper icon"></span>
        <span>Facturation</span>
      </a>
      <a routerLink="/company/reports" routerLinkActive="active" class="nav-item">
        <span class="ion-ios-pie icon"></span>
        <span>Rapports</span>
      </a>
    </div>

    <div class="nav-section">
      <p class="section-title">Compte</p>
      <a routerLink="/acceuil/profile" class="nav-item">
        <span class="ion-ios-person icon"></span>
        <span>Profil Corporate</span>
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">
    <button class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center gap-2" (click)="logout()">
      <span class="ion-ios-log-out"></span>
      <span>Déconnexion</span>
    </button>
  </div>
</aside>
