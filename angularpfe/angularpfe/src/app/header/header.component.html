<nav class="navbar navbar-expand-lg navbar-dark ftco_navbar bg-dark ftco-navbar-light bg-transparent-header" id="ftco-navbar">
  <div class="container-custom">
    <a class="navbar-brand goride-logo" routerLink="/acceuil" (click)="closeAllMenus()">
      <div class="logo-wrapper d-flex align-items-center">
        <svg viewBox="0 0 100 100" width="36" height="36" xmlns="http://www.w3.org/2000/svg" class="me-2">
          <path d="M 65 15 A 35 35 0 0 0 15 50" stroke="#2563eb" stroke-width="12" fill="none" />
          <path d="M 18 68 A 35 35 0 0 0 50 85" stroke="#2563eb" stroke-width="12" fill="none" />
          <path fill-rule="evenodd" clip-rule="evenodd" d="M 50 45 C 50 25, 80 25, 80 45 C 80 65, 65 95, 65 95 C 65 95, 50 65, 50 45 Z M 65 35 A 10 10 0 1 0 65 55 A 10 10 0 1 0 65 35 Z" fill="#2563eb"/>
        </svg>
        <span class="logo-text fw-bold" style="font-size: 24px; letter-spacing: -0.5px; margin-bottom: 0;">
          <span class="logo-part-dark">GO</span><span class="logo-part-blue">RIDE</span>
        </span>
      </div>
    </a>

    <button
      class="navbar-toggler"
      type="button"
      (click)="toggleNavbar($event)"
      aria-controls="ftco-nav"
      [attr.aria-expanded]="isNavbarOpen"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="ftco-nav" [class.show]="isNavbarOpen">
      <ul class="navbar-nav mx-auto align-items-lg-center">
        <li class="nav-item" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <a class="nav-link" routerLink="/acceuil" (click)="closeAllMenus()">{{ 'NAV.HOME' | translate }}</a>
        </li>

        <li class="nav-item" routerLinkActive="active">
          <a class="nav-link" routerLink="/acceuil/services" (click)="closeAllMenus()">{{ 'NAV.SERVICES' | translate }}</a>
        </li>

        <li class="nav-item" routerLinkActive="active">
          <a class="nav-link" routerLink="/acceuil/about" (click)="closeAllMenus()">{{ 'NAV.ABOUT' | translate }}</a>
        </li>
        <li class="nav-item" routerLinkActive="active">
          <a class="nav-link" routerLink="/acceuil/contact" (click)="closeAllMenus()">{{ 'NAV.CONTACT' | translate }}</a>
        </li>
      </ul>

      <ul class="navbar-nav ms-auto align-items-lg-center">
        <li class="nav-item">
          <button class="nav-link lang-toggle" type="button" (click)="toggleLanguage($event)">
            <span class="lang-toggle__icon" aria-hidden="true">
              <span class="ion-ios-globe"></span>
            </span>
            <span class="lang-toggle__label">{{ currentLanguageLabel }}</span>
          </button>
        </li>

        <ng-container *ngIf="!authService.isLoggedIn()">
          <li class="nav-item">
            <a class="nav-link btn btn-outline-light auth-btn ms-lg-3" routerLink="/login" (click)="closeAllMenus()">
              {{ 'NAV.LOGIN' | translate }}
            </a>
          </li>

          <li class="nav-item">
            <a
              class="nav-link btn btn-primary auth-btn ms-lg-2"
              routerLink="/signup"
              (click)="closeAllMenus()"
            >
              {{ 'NAV.REGISTER' | translate }}
            </a>
          </li>
        </ng-container>

        <ng-container *ngIf="authService.isLoggedIn()">
          <li class="nav-item">
            <a class="nav-link fw-bold" routerLink="/acceuil/profile" (click)="closeAllMenus()">
              <span class="ion-ios-contact me-2"></span>
              {{ currentUserFullName }}
            </a>
          </li>
          <li class="nav-item">
            <button type="button" class="nav-link btn btn-link text-danger ms-lg-2" (click)="logout()">
              <span class="ion-ios-log-out me-1"></span> {{ 'NAV.LOGIN' | translate }}
            </button>
          </li>
        </ng-container>
      </ul>
    </div>
  </div>
</nav>
