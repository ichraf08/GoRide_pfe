<div class="users-management">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">Gestion des Utilisateurs</h4>
    <div class="search-filter d-flex gap-2">
      <input type="text" class="form-control rounded-pill px-3" placeholder="Chercher un nom, email...">
      <button class="btn btn-dark rounded-pill px-3">Filtre</button>
    </div>
  </div>

  <div class="content-card shadow-sm bg-white rounded-4 overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light">
          <tr>
            <th class="ps-4">Utilisateur</th>
            <th>Email</th>
            <th>Rôles</th>
            <th>Statut</th>
            <th>Date d'inscription</th>
            <th class="text-end pe-4">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="ps-4">
              <div class="d-flex align-items-center gap-3">
                <img src="assets/images/person_2.jpg" class="rounded-circle" width="35" height="35">
                <span class="fw-bold small">Ahmed Mansour</span>
              </div>
            </td>
            <td><span class="small text-muted">ahmed.m@email.com</span></td>
            <td>
              <div class="d-flex gap-1">
                <span class="badge bg-primary-soft text-primary tiny">CLIENT</span>
                <span class="badge bg-success-soft text-success tiny">CHAUFFEUR</span>
              </div>
            </td>
            <td><span class="badge bg-success-soft text-success">Actif</span></td>
            <td><span class="small text-muted">12/02/2026</span></td>
            <td class="text-end pe-4">
              <button class="btn btn-icon-only text-danger"><span class="ion-ios-trash"></span></button>
              <button class="btn btn-icon-only text-muted ms-2"><span class="ion-ios-more"></span></button>
            </td>
          </tr>
          <tr>
            <td class="ps-4">
              <div class="d-flex align-items-center gap-3">
                <img src="assets/images/person_4.jpg" class="rounded-circle" width="35" height="35">
                <span class="fw-bold small">Sophie Robert</span>
              </div>
            </td>
            <td><span class="small text-muted">sophie.r@corporate.fr</span></td>
            <td><span class="badge bg-indigo-soft text-indigo tiny">ENTREPRISE</span></td>
            <td><span class="badge bg-warning-soft text-warning">En attente</span></td>
            <td><span class="small text-muted">14/05/2026</span></td>
            <td class="text-end pe-4">
              <button class="btn btn-icon-only text-danger"><span class="ion-ios-trash"></span></button>
              <button class="btn btn-icon-only text-muted ms-2"><span class="ion-ios-more"></span></button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
