<div class="vehicles-validation">
  <div class="mb-4">
    <h4 class="fw-bold mb-1">Validation de Flotte</h4>
    <p class="text-muted small">Vérifiez les documents et approuvez les nouveaux véhicules.</p>
  </div>

  <div class="row g-4" *ngIf="pendingVehicles.length > 0; else noPending">
    <div class="col-12" *ngFor="let v of pendingVehicles">
      <div class="content-card shadow-sm bg-white rounded-4 p-4 border-start border-warning border-4">
        <div class="row align-items-center">
          <div class="col-md-2">
            <img [src]="v.image" class="rounded-3 w-100 shadow-sm" style="height: 80px; object-fit: cover;">
          </div>
          <div class="col-md-3">
            <span class="text-muted tiny text-uppercase fw-bold d-block">Véhicule</span>
            <span class="fw-bold">{{ v.brand }} {{ v.model }}</span>
            <span class="badge bg-light text-dark border ms-2">{{ v.plate }}</span>
          </div>
          <div class="col-md-3">
            <span class="text-muted tiny text-uppercase fw-bold d-block">Propriétaire</span>
            <span class="fw-bold small">{{ v.owner }}</span>
          </div>
          <div class="col-md-2">
             <span class="badge bg-warning-soft text-warning">En attente d'examen</span>
          </div>
          <div class="col-md-2 text-end">
            <div class="d-flex flex-column gap-2">
              <button class="btn btn-success btn-sm rounded-pill fw-bold" (click)="approveVehicle(v.id)">Approuver</button>
              <button class="btn btn-outline-danger btn-sm rounded-pill fw-bold" (click)="rejectVehicle(v.id)">Rejeter</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ng-template #noPending>
    <div class="text-center py-5">
      <span class="ion-ios-checkmark-circle text-success fs-1"></span>
      <h5 class="mt-3">Tout est à jour !</h5>
      <p class="text-muted">Aucun véhicule en attente de validation.</p>
    </div>
  </ng-template>
</div>
